name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run format:check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run test:unit

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          retention-days: 1

  integration-tests:
    name: Integration Tests
    needs: build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ./data/ci-test.db
      BETTER_AUTH_SECRET: ci-test-secret-not-real
      BETTER_AUTH_URL: http://localhost:4173
      GITHUB_CLIENT_ID: ci-test-client-id
      GITHUB_CLIENT_SECRET: ci-test-client-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - uses: actions/download-artifact@v4
        with:
          name: build
          path: build/

      - run: npm run test:integration
