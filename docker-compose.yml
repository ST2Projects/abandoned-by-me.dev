services:
  app:
    image: ghcr.io/st2projects/abandoned-by-me.dev:latest
    container_name: abandoned-by-me-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3456}:3456"
    environment:
      NODE_ENV: production
      DATABASE_URL: /app/data/app.db
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3456}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      DEBUG: ${DEBUG:-false}
    volumes:
      - app_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3456/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  app_data:
    driver: local
